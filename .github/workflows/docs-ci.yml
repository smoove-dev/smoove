name: docs-ci

on:
  pull_request:
    paths:
      - "packages/docs/**"
      - "packages/core/**"
      - "packages/google-fonts/**"
      - "packages/player/**"
      - "packages/transitions/**"
      - "packages/vite/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/docs-ci.yml"
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
      - "packages/core/**"
      - "packages/google-fonts/**"
      - "packages/player/**"
      - "packages/transitions/**"
      - "packages/vite/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/docs-ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --filter "@smoove/docs..." --frozen-lockfile
      - run: pnpm biome check .
      - run: pnpm --filter "@smoove/docs..." run build
      - run: pnpm --filter @smoove/docs run typecheck

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Trigger Coolify deploy
        run: |
          # Fail on any non-2xx. Without this, a Cloudflare Access bounce
          # (302 -> login) reads as success and the deploy silently no-ops.
          code=$(curl -sS -o /tmp/deploy-body -w '%{http_code}' -X POST \
            "${COOLIFY_BASE_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          echo "HTTP $code"
          cat /tmp/deploy-body
          case "$code" in
            2*) ;;
            *) echo "::error::Coolify deploy returned HTTP $code (CF Access token likely not accepted)"; exit 1 ;;
          esac
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
